<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carrito | Full Gas Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="js/store.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body data-page="cart">
  <nav class="navbar navbar-expand-lg navbar-dark bg-shell sticky-top border-bottom border-white border-opacity-10"><div class="container"><a class="navbar-brand d-flex align-items-center gap-2 fw-semibold" href="index.html"><img src="assets/logo.jpg" alt="Full Gas Detail" class="brand-logo brand-logo-sm"><span>Full Gas Detail</span></a><div class="ms-auto d-flex gap-2"><a class="btn btn-outline-light btn-sm" href="products.html">Productos</a><a class="btn btn-brand btn-sm" href="checkout.html">Finalizar</a></div></div></nav>
  <main class="py-5">
    <div class="container">
      <div class="row g-4">
        <div class="col-12 col-xl-8">
          <div class="panel-card h-100">
            <div class="d-flex justify-content-between align-items-center mb-3"><h1 class="h3 fw-bold mb-0">Carrito de compras</h1><span class="text-white-50 small" id="cartCountLabel"></span></div>
            <div class="table-responsive">
              <table class="table table-dark table-borderless align-middle mb-0">
                <thead><tr><th>Item</th><th>Cantidad</th><th>Precio</th><th></th></tr></thead>
                <tbody id="cartTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="col-12 col-xl-4">
          <div class="panel-card h-100">
            <h2 class="h4 fw-bold">Resumen</h2>
            <div class="summary-box mt-3" id="cartSummary"></div>
            <a class="btn btn-brand w-100 mt-4" href="checkout.html">Ir a confirmacion</a>
            <a class="btn btn-outline-light w-100 mt-2" href="products.html">Seguir comprando</a>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
