<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mis compras | Full Gas Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="js/formularios.js"></script>
  <script defer src="js/store.js"></script>
  <script defer src="js/dashboard.js"></script>
</head>
<body data-page="client-dashboard">
  <nav class="navbar navbar-expand-lg navbar-dark bg-shell sticky-top border-bottom border-white border-opacity-10">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold" href="index.html">
        <img src="assets/logo.jpg" alt="Full Gas Detail" class="brand-logo brand-logo-sm">
        <span>Full Gas Detail</span>
      </a>
      <div class="ms-auto d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="products.html">Productos</a>
        <a class="btn btn-brand btn-sm" href="services.html">Servicios</a>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div class="row align-items-end g-3 mb-4">
        <div class="col-12 col-lg-8">
          <span class="eyebrow">Area del cliente</span>
          <h1 class="h2 fw-bold mt-2">Monitorea tus compras y servicios desde tu perfil</h1>
          <p class="text-white-50 mb-0">Aqui puedes revisar el historial asociado a tu correo y tener una vista rapida de tus pedidos registrados.</p>
        </div>
      </div>

      <div class="row g-4 mb-4" id="clientStats"></div>

      <div class="row g-4">
        <div class="col-12 col-lg-4">
          <div class="panel-card h-100">
            <h2 class="h4 fw-bold">Tus datos</h2>
            <div class="session-box mt-3" id="clientSummary"></div>
          </div>
        </div>
        <div class="col-12 col-lg-8">
          <div class="panel-card h-100">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <h2 class="h4 fw-bold mb-0">Historial de compras</h2>
              <a class="btn btn-outline-light btn-sm" href="checkout.html">Ir a pago</a>
            </div>
            <div class="table-responsive mt-3">
              <table class="table table-dark table-borderless align-middle">
                <thead>
                  <tr>
                    <th>Tipo</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                  </tr>
                </thead>
                <tbody id="clientOrdersTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
